source = ~/.config/hypr/config/colors.conf
$font = CommitMono Nerd Font Mono

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
}

input-field {
    monitor = DP-1
    size = 18%, 4%
    outline_thickness = 2
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = $giantsorange
    check_color = $raisinblack
    fail_color = $chestnut

    font_color = $champagne
    fade_on_empty = false
    rounding = 50

    font_family = $font
    placeholder_text = Password

    # uncomment to use a letter instead of a dot to indicate the typed password
    # dots_text_format = *
    # dots_size = 0.4
    dots_spacing = 0.4

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, -15%
    halign = center
    valign = center
}

# USER
label {
    monitor = DP-1
    text = $USER # username variable
    font_size = 4%
    font_family = $font

    position = 0, -10%
    halign = center
    valign = center
}

# TIME
label {
    monitor = DP-1
    text = cmd[update:1000] date +"%H:%M:%S" # update every 60 seconds
    font_size = 90
    font_family = $font

    position = 0, 15%
    halign = center
    valign = center
}

# DATE
label {
    monitor = DP-1
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 30
    font_family = $font

    position = 0, 9%
    halign = center
    valign = center
}