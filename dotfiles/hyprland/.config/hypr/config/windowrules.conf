# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Windowrules Configuration                ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Windows Rules https://wiki.hyprland.org/Configuring/Window-Rules/ #

# Float Necessary Windows
# windowrulev2 = float, class:^(org.pulseaudio.pavucontrol)
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on
windowrule = match:class ^()$, match:title ^(Picture in picture)$, float on
windowrule = match:class ^()$, match:title ^(Save File)$, float on
windowrule = match:class ^()$, match:title ^(Open File)$, float on
windowrule = match:class ^(xdg-desktop-portal-gtk|xdg-desktop-portal-kde|xdg-desktop-portal-hyprland)(.*)$, float on
windowrule = match:class ^(polkit-gnome-authentication-agent-1|hyprpolkitagent|org.org.kde.polkit-kde-authentication-agent-1)(.*)$, float on
windowrule = match:class ^(CachyOSHello)$, float on
windowrule = match:class ^(zenity)$, float on
windowrule = match:class ^(Steam)$, match:title ^(Steam - Self Updater)$, float on
windowrule = match:class ^(python3)$, match:title ^(.*HP Device Manager.*)$, float on
# Set opacity
# Set opacity rules
windowrule = match:class ^(FFPWA.*)$, opacity 0.85
windowrule = match:class ^(kitty)$, opacity 0.75
windowrule = match:class ^(FFPWA.*)$, match:initial_title ^(Jellyfin)$, opacity 1
windowrule = match:class ^(Spotify)$, opacity 0.7
windowrule = match:class ^(nemo)$, opacity 0.7
windowrule = match:class ^(thunar)$, opacity 0.7
windowrule = match:class ^(discord)$, opacity 0.85
windowrule = match:class ^(org.telegram.desktop)$, opacity 0.85
windowrule = match:class ^(code)$, opacity 0.9
# General window rules
windowrule = match:class ^(Spotify)$, no_initial_focus on
windowrule = match:class ^(Spotify)$, suppress_event activatefocus
windowrule = match:class ^(Spotify)$, workspace name:spotify
windowrule = match:class ^(kitty)$, match:title ^(bluetui)$, float on
windowrule = match:class ^(kitty)$, match:title ^(bluetui)$, size 540 343
windowrule = match:class ^(kitty)$, match:title ^(bluetui)$, move 100%-w-20 4%
windowrule = match:class ^(kitty)$, match:title ^(bluetui)$, animation slide down
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(blueman-manager)$, size 540 343
windowrule = match:class ^(blueman-manager)$, move 100%-w-20 4%
windowrule = match:class ^(blueman-manager)$, animation slide down
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(nm-connection-editor)$, size 540 343
windowrule = match:class ^(nm-connection-editor)$, move 100%-w-20 4%
windowrule = match:class ^(nm-connection-editor)$, animation slide down
windowrule = match:class ^(dota2|steam_app.*|gamescope)$, workspace name:game
windowrule = match:class ^(steam)$, match:title ^(Friends List)$, float on
windowrule = match:class ^(steam)$, size 100% 100%
windowrule = match:class ^(steam)$, workspace name:steam
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Picture-in-Picture)$, size 960 540
windowrule = match:title ^(Picture-in-Picture)$, move 25%-
windowrule = match:class ^(org.mozilla.firefox)$, no_blur on
windowrule = match:title ^(Bitwarden)$, float on
windowrule = match:title ^(Bitwarden)$, size 1200 600
windowrule = match:class ^(org.telegram.desktop)$, workspace name:right
windowrule = match:class ^(org.telegram.desktop)$, no_initial_focus on
windowrule = match:class ^(FFPWA.*)$, match:title ^(Messenger)$, workspace name:right
windowrule = match:class ^(FFPWA.*)$, match:title ^(Messenger)$, no_initial_focus on
windowrule = match:class ^(discord)$, workspace name:right
windowrule = match:class ^(discord)$, match:title ^(Discord)$, workspace 5000 silent
windowrule = match:class ^(discord)$, no_initial_focus on
windowrule = match:class ^(FFPWA.*)$, match:title ^(.*Home Assistant.*)$, workspace name:left
windowrule = match:class ^(FFPWA.*)$, match:title ^(.*Home Assistant.*)$, no_initial_focus on
windowrule = match:class ^(nl.jknaapen.fladder)$, maximize on
# Decorations related to floating windows on workspaces 1 to 10
windowrule = match:float on, match:workspace w[fv1-10], border_size 2
windowrule = match:float on, match:workspace w[fv1-10], border_color $giantsorange
windowrule = match:float on, match:workspace w[fv1-10], rounding 8
# Decorations related to tiling windows on workspaces 1 to 10
windowrule = match:float off, match:workspace f[1-10], border_size 3
windowrule = match:float off, match:workspace f[1-10], rounding 4
# Windows Rules End #

# Layers Rules #
layerrule =  match:namespace logout_dialog, animation slide top
# layerrule = animation popin 50%, waybar
layerrule = match:namespace waybar, animation slide down
layerrule = match:namespace wallpaper, animation fade 50%
# Layers Rules End #